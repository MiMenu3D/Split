<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Version Split 1.03</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://unpkg.com/three@0.139.2/examples/js/loaders/RGBELoader.js"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
#prueba {
  font-size: 22px;
  color: white;
  text-shadow: 0 0 10px black;
  margin-bottom: 12px;
}

html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
  background: #1f1a17;
}

#mvContainer {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 40%;
  background: #1f1a17;
  z-index: 40;
}

model-viewer {
  width: 100%;
  height: 100%;
  background: transparent;
  filter: saturate(0.87) contrast(0.88);
  opacity: 0;
  transition: opacity 0.5s ease;
}

#startScreen {
  position: fixed;
  top: 40%;
  left: 0;
  right: 0;
  bottom: 0;
  background: url("Loading screen.png") center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  padding-bottom: 20%;
  z-index: 30;
}

.arrowContainer { display:flex; gap:20px; margin-bottom:10px; }

.arrow {
  font-size: 28px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.9);
  border-radius: 12px;
  border: none;
}

.button {
  background: white;
  color: black;
  padding: 14px 28px;
  border-radius: 30px;
  font-size: 16px;
  border: none;
}

#arContainer {
  position: fixed;
  inset: 0;
  background: transparent;
  z-index: 51;
  display: none;
}

a-scene, a-scene canvas, #arContainer video {
  background: transparent !important;
}

a-scene { width:100%; height:100%; }
</style>
</head>

<body>

<div id="mvContainer"></div>

<div id="startScreen">
  <div id="prueba">Version Split 1.02</div>
  <div id="label">Plato 01</div>

  <div class="arrowContainer">
    <button class="arrow" onclick="prev()">&#8592;</button>
    <button class="arrow" onclick="next()">&#8594;</button>
  </div>

    <button class="button" onclick="startAR()">Ver en tu mesa</button>
</div>

    <script>
    // Menu Handmade Unified v1.16
    window.RepoFusion = window.RepoFusion || {};
    window.RepoFusion.pose = {
      camera: null,
      marker: null,
      intrinsics: null,
      tracking: "waiting"
    };

    window.RepoFusion.setPose = function (data) {
      if (!data) return;
      window.RepoFusion.pose.camera = data.camera || null;
      window.RepoFusion.pose.marker = data.marker || null;
      window.RepoFusion.pose.intrinsics = data.intrinsics || null;
      window.RepoFusion.pose.tracking = data.tracking || "unknown";
    };

    let current = 0;
    let mv = null;
    const models = [
      "Plato_01.glb","Plato_02.glb","Plato_03.glb","Plato_04.glb",
      "Plato_05.glb","Plato_06.glb","Plato_07.glb","Plato_08.glb",
      "Plato_09.glb","Plato_10.glb","Plato_11.glb","Plato_12.glb",
      "Plato_13.glb","Plato_14.glb","Plato_15.glb"
    ];

    function createMV(){
      const container = document.getElementById("mvContainer");
      container.innerHTML = `
        <model-viewer
          id="mv"
          src="${models[current]}"
          autoplay
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="17deg"
          camera-orbit="0deg 70deg 45%"
          min-camera-orbit="0deg 0deg 45%"
          max-camera-orbit="360deg 90deg 45%"
          camera-controls="false"
          touch-action="none"
          disable-pan
          disable-zoom
          interaction-prompt="none"
          shadow-intensity="0.4"
          exposure="0.80"
          style="background-color:#1f1a17;">
        </model-viewer>`;

      mv = document.getElementById("mv");
      mv.addEventListener("load", () => mv.style.opacity = "1", {once:true});
      document.getElementById("label").innerText = "Plato " + (current + 1);
    }

    function updateMV(){
      if (!mv) return;
      mv.style.opacity = "0";
      mv.setAttribute("src", models[current]);
      mv.addEventListener("load", () => mv.style.opacity = "1", {once:true});
      document.getElementById("label").innerText = "Plato " + (current + 1);
    }

    function destroyMV(){
      document.getElementById("mvContainer").innerHTML = "";
      mv = null;
    }

    function prev(){
      current = (current - 1 + models.length) % models.length;
      if (!mv) createMV();
      updateMV();
    }

    function next(){
      current = (current + 1) % models.length;
      if (!mv) createMV();
      updateMV();
    }

    function startAR(){
      sessionStorage.setItem("modelo_actual", current);
      window.location.href = 'ar.html';
    }

        window.addEventListener("DOMContentLoaded", () => {
      const saved = sessionStorage.getItem("modelo_actual");
      if (saved !== null) current = parseInt(saved);
      createMV();
    });
  </script>
</body>
</html>
