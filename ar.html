<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AR Session - Version Split 1.02</title>
  
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://unpkg.com/three@0.139.2/examples/js/loaders/RGBELoader.js"></script>
  
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; background: transparent; }
    #arContainer { position: fixed; inset: 0; z-index: 51; }
    a-scene, a-scene canvas, #arContainer video { background: transparent !important; }
    a-scene { width:100%; height:100%; }
  </style>
</head>
<body>
  <div id="arContainer"></div>
  <script>
    window.RepoFusion = window.RepoFusion || { pose: { camera: null, marker: null } };
    window.AR = window.AR || {};
    window.AR.isReady = false;

    window.xrConfigData = {
      imageTargetData: [
        {
          type: "PLANAR",
          properties: {
            top: 0,
            left: 312,
            width: 1875,
            height: 2500,
            isRotated: false,
            originalWidth: 2500,
            originalHeight: 2500
          },
          imagePath: "image-targets/marker_luminance.png",
          metadata: null,
          name: "marker",
          resources: {
            originalImage: "marker_original.png",
            croppedImage: "marker_cropped.png",
            thumbnailImage: "marker_thumbnail.png",
            luminanceImage: "marker_luminance.png"
          },
          created: 1781091877698,
          updated: 1781091877698
        }
      ]
    };

    function configureXR8Targets() {
      if (window.XR8 && window.XR8.XrController && typeof window.XR8.XrController.configure === "function") {
        window.XR8.XrController.configure(window.xrConfigData);
      }
    }

    if (window.XR8) {
      configureXR8Targets();
    } else {
      window.addEventListener("xrloaded", configureXR8Targets, { once: true });
      window.addEventListener("XRloaded", configureXR8Targets, { once: true });
    }

    let envEnabled = true;

    // --- BRIDGE CODE START ---
    const BRIDGE_VERSION = "Bridge Handmade Unified v1.4";
    const panel = document.createElement("div");
    panel.id = "bridgeDebugPanel";
    panel.style.position = "fixed";
    panel.style.top = "10px";
    panel.style.left = "10px";
    panel.style.background = "rgba(0,0,0,0.85)";
    panel.style.color = "lime";
    panel.style.padding = "10px";
    panel.style.fontFamily = "monospace";
    panel.style.fontSize = "12px";
    panel.style.whiteSpace = "pre";
    panel.style.zIndex = "999999";
    panel.style.maxHeight = "85vh";
    panel.style.overflow = "auto";
    panel.style.cursor = "pointer";

    let isMinimized = false;
    panel.onclick = (e) => {
      e.stopPropagation();
      isMinimized = !isMinimized;
      panel.style.height = isMinimized ? "20px" : "auto";
      panel.style.overflow = isMinimized ? "hidden" : "auto";
    };

    document.body.appendChild(panel);

    window.Tracking = { camera: null, marker: null, intrinsics: null, tracking: "waiting" };

    function normalizeMarker(reality) {
      const img = reality?.detectedImages?.[0];
      if (!img) return null;
      return { position: img.position || null, rotation: img.rotation || null, scale: img.scale || 1, name: img.name };
    }

    function extractCamera(reality) {
      return { rotation: reality?.rotation || null, position: reality?.position || null };
    }

    function installBridge() {
      if (!window.XR8) {
        panel.textContent = BRIDGE_VERSION + "\nXR8 not found";
        return;
      }
      XR8.addCameraPipelineModule({
        name: "bridge-exporter",
        onUpdate: ({ processCpuResult }) => {
          const reality = processCpuResult?.reality;
          if (!reality) return;
          window.Tracking.camera = extractCamera(reality);
          window.Tracking.marker = normalizeMarker(reality);
          window.Tracking.intrinsics = reality.intrinsics || null;
          window.Tracking.tracking = reality.trackingStatus || "unknown";

          if (window.RepoFusion && window.RepoFusion.setPose) {
            window.RepoFusion.setPose({
              camera: window.Tracking.camera,
              marker: window.Tracking.marker,
              intrinsics: window.Tracking.intrinsics,
              tracking: window.Tracking.tracking
            });
          }
        }
      });
      panel.textContent = BRIDGE_VERSION + "\ninstalled ✔";
    }

    function waitForBridgeXR8() {
      if (window.XR8) {
        installBridge();
      } else {
        window.addEventListener("xrloaded", installBridge, { once: true });
      }
    }
    waitForBridgeXR8();

    function renderBridge() {
      let out = BRIDGE_VERSION + "\n\n";
      out += "TRACKING: " + window.Tracking.tracking + "\n\n";
      out += "CAMERA:\n" + JSON.stringify(window.Tracking.camera, null, 2) + "\n\n";
      out += "MARKER:\n" + JSON.stringify(window.Tracking.marker, null, 2) + "\n\n";
      out += "INTRINSICS:\n" + JSON.stringify(window.Tracking.intrinsics, null, 2) + "\n\n";
      const video = document.querySelector("video");
      out += "VIDEO: " + (video ? "YES" : "NO");
      panel.textContent = out;
    }
    installBridge();
    setInterval(renderBridge, 150);
    // --- BRIDGE CODE END ---

    let originalEnv = null;
    let cameraEnv = null;
    let envMode = "hdr";
    let pmremGenerator = null;
    let cameraRT = null;
    let envInterval = null;
    let arIntervalId = null;
    let xrLoadPromise = null;
    let envTexture = null;
    let envCanvas = null;
    let video = null;
    let markerFound = false;
    let scanOverlay = null;

    function loadScript({ id, src, async = false, attrs = {} }) {
      if (document.getElementById(id)) return;
      const script = document.createElement("script");
      script.id = id;
      script.src = src;
      script.async = async;
      Object.entries(attrs).forEach(([key, value]) => script.setAttribute(key, value));
      document.body.appendChild(script);
    }

    function loadXR8Assets() {
      loadScript({ id: "runtimeScript", src: "./external/runtime/runtime.js" });
      loadScript({ id: "xrScript", src: "./external/xr/xr.js", async: true, attrs: { "data-preload-chunks": "face, slam" } });
      loadScript({ id: "xrConfigScript", src: "xr-config.js" });
      loadScript({ id: "bridgeScript", src: "bridge.js?t=" + Date.now() });
    }

    function waitForXR8() {
      if (!xrLoadPromise) {
        xrLoadPromise = new Promise((resolve) => {
          const onXRLoaded = () => resolve(window.XR8);
          if (window.XR8) {
            resolve(window.XR8);
          } else {
            window.addEventListener("xrloaded", onXRLoaded, { once: true });
            window.addEventListener("XRloaded", onXRLoaded, { once: true });
          }
        });
      }
      return xrLoadPromise;
    }

    function createARScene(modelSrc) {
      markerFound = false;
      scanOverlay = null;
      const container = document.getElementById("arContainer");
      container.style.background = "transparent";
      container.innerHTML = `
        <a-scene
          xrweb
          xrconfig="cameraDirection: back; delayRun: true"
          renderer="alpha: true; physicallyCorrectLights: true; colorManagement: true; exposure: 1.01; toneMapping: ACESFilmicToneMapping;"
          color-space="sRGB"
          embedded
          vr-mode-ui="enabled:false"
          device-orientation-permission-ui="enabled:false">
          <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
          <a-entity id="trackingRoot">
            <a-gltf-model id="aframeModel" src="${modelSrc}" rotation="90 0 0" scale="1 1 1" visible="false"></a-gltf-model>
          </a-entity>
        </a-scene>`;

      scanOverlay = document.createElement("div");
      scanOverlay.id = "mindarScanningOverlay";
      scanOverlay.className = "mindar-ui-scanning";
      scanOverlay.innerHTML = `<div>Escaneando marcador...</div>`;
      container.appendChild(scanOverlay);

      const sceneEl = container.querySelector("a-scene");
      sceneEl.addEventListener("loaded", () => {
        if (arIntervalId) {
          clearInterval(arIntervalId);
        }
        arIntervalId = setInterval(() => {
          const root = document.getElementById("trackingRoot");
          if (!root || !window.RepoFusion) return;
          const marker = window.RepoFusion.pose.marker;
          const hasMarker = marker && marker.position && marker.rotation;
          if (!markerFound && hasMarker) {
            markerFound = true;
            const model = document.getElementById("aframeModel");
            if (model) model.setAttribute("visible", true);
            if (scanOverlay) scanOverlay.style.display = "none";
          }
          if (!hasMarker) return;

          const targetPosition = new THREE.Vector3(marker.position.x, marker.position.y, marker.position.z);
          root.object3D.position.lerp(targetPosition, 0.35);

          const targetQuat = new THREE.Quaternion(marker.rotation.x, marker.rotation.y, marker.rotation.z, marker.rotation.w);
          root.object3D.quaternion.slerp(targetQuat, 0.35);

          const targetScale = Math.max(marker.scale || 1, 0.0001) * 8;
          const currentScale = root.object3D.scale.x || 1;
          root.object3D.scale.setScalar(THREE.MathUtils.lerp(currentScale, targetScale, 0.35));
        }, 30);

        pmremGenerator = new THREE.PMREMGenerator(sceneEl.renderer);
        pmremGenerator.compileEquirectangularShader();

        const waitForVideo = setInterval(() => {
          const candidate = document.querySelector("video");
          if (candidate && candidate.readyState >= 2) {
            clearInterval(waitForVideo);
            video = candidate;
            video.style.position = "fixed";
            video.style.top = "0";
            video.style.left = "0";
            video.style.width = "100%";
            video.style.height = "100%";
            video.style.objectFit = "cover";
            video.style.zIndex = "50";
            video.style.pointerEvents = "none";
            cameraEnv = new THREE.VideoTexture(video);
            cameraEnv.colorSpace = THREE.SRGBColorSpace;

            envCanvas = document.createElement("canvas");
            envCanvas.width = 64;
            envCanvas.height = 64;
            envTexture = new THREE.CanvasTexture(envCanvas);
            envTexture.mapping = THREE.EquirectangularReflectionMapping;
            const ctx = envCanvas.getContext("2d");
            let smoothed = 120;

            envInterval = setInterval(() => {
              if (!video || video.readyState < 2) return;
              ctx.drawImage(video, 0, 0, 64, 64);
              envTexture.needsUpdate = true;
              if (pmremGenerator) {
                if (cameraRT) cameraRT.dispose();
                cameraRT = pmremGenerator.fromEquirectangular(envTexture);
                if (envMode === "cam") sceneEl.object3D.environment = cameraRT.texture;
              }
              const pixels = ctx.getImageData(0, 0, 64, 64).data;
              let total = 0;
              for (let i = 0; i < pixels.length; i += 4) total += (pixels[i] + pixels[i + 1] + pixels[i + 2]) / 3;
              const brightness = total / (pixels.length / 4);
              smoothed = smoothed + (brightness - smoothed) * 0.08;
              const exposure = 0.6 + (smoothed / 255) * 0.9;
              if (sceneEl.renderer) sceneEl.renderer.exposure = exposure;
            }, 50);
          }
        }, 500);

        new THREE.RGBELoader().load("terrace_sea.hdr", (hdr) => {
          hdr.mapping = THREE.EquirectangularReflectionMapping;
          originalEnv = hdr;
          sceneEl.object3D.environment = hdr;
        });

        if (sceneEl.renderer) {
          sceneEl.renderer.setClearColor(0x000000, 0);
        }
        sceneEl.setAttribute('background', 'color: transparent');

        if (sceneEl.hasLoaded) {
          sceneEl.emit("runreality");
        } else {
          sceneEl.addEventListener("loaded", () => sceneEl.emit("runreality"), { once: true });
        }
      }, {once:true});
    }

    function destroyARScene() {
      if (envInterval) {
        clearInterval(envInterval);
        envInterval = null;
      }
      if (arIntervalId) {
        clearInterval(arIntervalId);
        arIntervalId = null;
      }
      const sceneEl = document.querySelector("a-scene");
      if (sceneEl) {
        if (sceneEl.renderer) sceneEl.renderer.dispose();
        sceneEl.parentElement.removeChild(sceneEl);
      }
      markerFound = false;
      scanOverlay = null;
      const container = document.getElementById("arContainer");
      if (container) container.innerHTML = "";
    }

    function startAR(modelSrc) {
      loadXR8Assets();
      return waitForXR8().then(() => createARScene(modelSrc));
    }

    function stopAR() {
      if (window.XR8) try { window.XR8.clearCameraPipelineModules(); } catch(e) {}
      destroyARScene();
      document.querySelectorAll("canvas").forEach(c => c.remove());
      xrLoadPromise = null;
      envMode = "hdr";
      window.XR8 = null;
      const xrScript = document.getElementById("xrScript");
      if (xrScript) xrScript.remove();
      const runtimeScript = document.getElementById("runtimeScript");
      if (runtimeScript) runtimeScript.remove();
    }

    window.AR.isReady = true;
    window.AR.startAR = startAR;
    window.AR.stopAR = stopAR;
    window.AR.toggleEnv = function() {
      const scene = document.querySelector("a-scene");
      const btn = document.getElementById("envToggle");
      if (!scene) return;
      if (envMode === "hdr") {
        if (cameraRT) scene.object3D.environment = cameraRT.texture;
        envMode = "cam";
      } else if (envMode === "cam") {
        scene.object3D.environment = null;
        envMode = "off";
      } else {
        scene.object3D.environment = originalEnv;
        envMode = "hdr";
      }
    };

    window.addEventListener("DOMContentLoaded", () => {
      const modelIdx = sessionStorage.getItem("modelo_actual");
      const models = [
        "Plato_01.glb","Plato_02.glb","Plato_03.glb","Plato_04.glb",
        "Plato_05.glb","Plato_06.glb","Plato_07.glb","Plato_08.glb",
        "Plato_09.glb","Plato_10.glb","Plato_11.glb","Plato_12.glb",
        "Plato_13.glb","Plato_14.glb","Plato_15.glb"
      ];
      if (modelIdx !== null) startAR(models[modelIdx]);
    });
  </script>
</body>
</html>
